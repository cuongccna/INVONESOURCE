# Nginx — Frontend: autopostvn.cloud
# Location: /etc/nginx/sites-available/autopostvn.cloud
# Enable: ln -s /etc/nginx/sites-available/autopostvn.cloud /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name autopostvn.cloud www.autopostvn.cloud;
    return 301 https://$host$request_uri;
}

# HTTPS — Next.js frontend
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name autopostvn.cloud www.autopostvn.cloud;

    # ── SSL (managed by Certbot) ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/autopostvn.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autopostvn.cloud/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # ── Next.js static assets (_next/static) — long cache ───────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Host $host;
    }

    # ── Service Worker — no-cache ────────────────────────────────────────────
    location = /sw.js {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        proxy_set_header Host $host;
    }

    # ── All other requests → Next.js ─────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/autopostvn.cloud.access.log;
    error_log  /var/log/nginx/autopostvn.cloud.error.log;
}
