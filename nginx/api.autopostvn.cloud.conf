# Nginx — Backend API: api.autopostvn.cloud
# Location: /etc/nginx/sites-available/api.autopostvn.cloud
# Enable: ln -s /etc/nginx/sites-available/api.autopostvn.cloud /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.autopostvn.cloud;
    return 301 https://$host$request_uri;
}

# HTTPS — Express backend
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.autopostvn.cloud;

    # ── SSL (managed by Certbot) ─────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.autopostvn.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.autopostvn.cloud/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"         always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Upload limit (invoice imports) ───────────────────────────────────────
    client_max_body_size 50M;

    # ── SSE endpoints (sync progress) — must NOT buffer ─────────────────────
    # Matches /api/invoices/sync/progress and similar /api/sync/* routes
    location ~* ^/api/(invoices/sync|sync)/ {
        proxy_pass http://127.0.0.1:3001;

        proxy_http_version 1.1;
        proxy_set_header Connection  "";
        proxy_set_header Host        $host;
        proxy_set_header X-Real-IP   $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Critical for SSE: disable buffering
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         1200s;
        proxy_send_timeout         1200s;
        keepalive_timeout          1200s;

        add_header X-Accel-Buffering "no";
    }

    # ── All other API requests ────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3001;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/api.autopostvn.cloud.access.log;
    error_log  /var/log/nginx/api.autopostvn.cloud.error.log;
}
